data_root: /data2/gangda/EvoClaw-data
trial_name: claude-code_kimi-coding
agent: claude-code
# Kimi's coding endpoint speaks native Anthropic /v1/messages — no router needed.
# The endpoint exposes ONE model id `kimi-for-coding`, but accepts "kimi-k2.6"
# (and probably any alias) as input and maps to kimi-for-coding internally
# (verified 2026-04-22 via direct probe).
model: kimi-k2.6
# Route all of Claude Code's class-based model slots (HAIKU/SONNET/OPUS/
# SUBAGENT/ANTHROPIC_MODEL) to the same model so nothing silently hits
# api.anthropic.com when the in-container UNIFIED_BASE_URL is set to
# api.kimi.com/coding.
default_haiku_model: kimi-k2.6
timeout: 18000
# No api_router — endpoint is Anthropic-native + supports context_management
# beta header server-side. This is the point of using api.kimi.com/coding
# instead of going through OpenRouter.
